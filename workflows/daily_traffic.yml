name: Daily Traffic Sync
on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch:   # Allows manual run

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Run script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GDRIVE_JSON: ${{ secrets.GDRIVE_JSON }}
        run: python get_traffic.py